<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enter Verification Code - QuizQuest</title>
  <link rel="stylesheet" th:href="@{/css/auth.css}" href="/css/auth.css">
  <style>
    .otp-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .otp-inputs {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    .otp-inputs input {
      width: 50px;
      height: 60px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      border: 2px solid #E2E8F0;
      border-radius: 8px;
      background: white;
      transition: all 0.2s;
    }
    .otp-inputs input:focus {
      border-color: #F97316;
      box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.1);
      outline: none;
    }
    .otp-inputs input.filled {
      border-color: #F97316;
      background: #FFF7ED;
    }
    .countdown {
      font-size: 14px;
      color: #666;
      margin-top: 10px;
    }
    .countdown.expired {
      color: #DC2626;
    }
    .resend-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-top: 20px;
    }
    .resend-button {
      background: none;
      border: none;
      color: #F05A3C;
      cursor: pointer;
      font-size: 14px;
      text-decoration: underline;
      transition: color 0.2s ease;
    }
    .resend-button:hover:not(:disabled) {
      color: #DC2626;
    }
    .resend-button:disabled {
      color: #999;
      cursor: not-allowed;
      text-decoration: none;
      position: relative;
    }
    .resend-button:disabled::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      margin-bottom: 8px;
      padding: 6px 12px;
      background: #333;
      color: white;
      font-size: 12px;
      border-radius: 6px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .resend-button:disabled:hover::after {
      opacity: 1;
    }
    .resend-info {
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body class="auth-page">
<main class="auth-shell" style="grid-template-columns:1fr;max-width:760px;">
  <section class="auth-panel" style="padding:0;">
    <div class="auth-panel__inner">
      <div class="auth-form is-active" style="position:static;opacity:1;visibility:visible;transform:none;pointer-events:auto;">
        <header class="auth-form__head">
          <p class="auth-form__eyebrow">Verification Needed</p>
          <h2>Enter verification code</h2>
          <p th:text="|We sent a 6-digit code to ${email}. Enter it below to verify your account.|">Enter the code from your email.</p>
        </header>

        <div th:if="${error}" class="auth-alert auth-alert--error" th:text="${error}">
          Invalid code
        </div>

        <div th:if="${info}" class="auth-alert auth-alert--success" th:text="${info}">
          Code sent
        </div>

        <form th:action="@{/verify-email}" method="post" class="otp-container" id="verifyForm">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
          <input type="hidden" name="email" th:value="${email}">

          <div class="otp-inputs">
            <input type="text" name="otp1" maxlength="1" inputmode="numeric" autocomplete="one-time-code" required>
            <input type="text" name="otp2" maxlength="1" inputmode="numeric" required>
            <input type="text" name="otp3" maxlength="1" inputmode="numeric" required>
            <input type="text" name="otp4" maxlength="1" inputmode="numeric" required>
            <input type="text" name="otp5" maxlength="1" inputmode="numeric" required>
            <input type="text" name="otp6" maxlength="1" inputmode="numeric" required>
          </div>

          <input type="hidden" name="otp" id="fullOtp">

          <div class="countdown" id="countdown">Code expires in 10:00</div>

          <button type="submit" class="primary-button" id="verifyBtn" style="width:100%;max-width:300px;">Verify Code</button>
        </form>

        <div class="resend-section">
          <form th:action="@{/verify-email/resend}" method="post" id="resendForm">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <input type="hidden" name="email" th:value="${email}">
            <button type="submit" class="resend-button" id="resendBtn" disabled data-tooltip="Please wait before requesting a new code">
              Resend in <span id="resendTimer">0:30</span>
            </button>
          </form>
          <div class="resend-info" th:text="|Remaining resend attempts: ${remainingAttempts ?: '3'}|">
            Remaining resend attempts: 3
          </div>
        </div>

        <div class="auth-form__extras" style="margin-top:24px;justify-content:center;">
          <a class="text-link" th:href="@{/login}">Back to login</a>
        </div>

        <div class="auth-alert auth-alert--info" style="margin-top:20px;">
          Check your spam folder if you don't see the email. The code expires in 10 minutes.
        </div>
      </div>
    </div>
  </section>
</main>

<script>
  // OTP Input handling
  const inputs = document.querySelectorAll('.otp-inputs input');
  const fullOtpInput = document.getElementById('fullOtp');

  function updateFullOtp() {
    const otp = Array.from(inputs).map(i => i.value).join('');
    fullOtpInput.value = otp;
  }

  inputs.forEach((input, index) => {
    // Auto-focus next input
    input.addEventListener('input', (e) => {
      if (e.target.value.length === 1) {
        if (index < inputs.length - 1) {
          inputs[index + 1].focus();
        }
        e.target.classList.add('filled');
      }
      updateFullOtp();
    });

    // Handle backspace
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
        inputs[index - 1].focus();
        inputs[index - 1].value = '';
        inputs[index - 1].classList.remove('filled');
      }
    });

    // Paste support
    input.addEventListener('paste', (e) => {
      e.preventDefault();
      const pasted = e.clipboardData.getData('text').replace(/\D/g, '').slice(0, 6);
      pasted.split('').forEach((char, i) => {
        if (inputs[i]) {
          inputs[i].value = char;
          inputs[i].classList.add('filled');
        }
      });
      updateFullOtp();
      if (inputs[Math.min(pasted.length, 5)]) {
        inputs[Math.min(pasted.length, 5)].focus();
      }
    });

    // Only allow numbers
    input.addEventListener('keypress', (e) => {
      if (!/[0-9]/.test(e.key)) {
        e.preventDefault();
      }
    });
  });

  // Focus first input on load
  inputs[0].focus();

  // Handle verify form submission with success state
  const verifyForm = document.getElementById('verifyForm');
  const verifyBtn = document.getElementById('verifyBtn');
  
  if (verifyForm && verifyBtn) {
    verifyForm.addEventListener('submit', function(e) {
      // Show success state briefly before redirect
      verifyBtn.disabled = true;
      verifyBtn.innerHTML = '✓ Verified!';
      verifyBtn.style.background = '#059669';
      
      // Let the form submit normally after showing success state
      setTimeout(() => {
        // Form will submit and redirect
      }, 500);
    });
  }

  // Countdown timer for code expiry (10 minutes)
  let expiryTime = 10 * 60; // 10 minutes in seconds
  const countdownEl = document.getElementById('countdown');

  function updateCountdown() {
    const minutes = Math.floor(expiryTime / 60);
    const seconds = expiryTime % 60;
    countdownEl.textContent = `Code expires in ${minutes}:${seconds.toString().padStart(2, '0')}`;

    if (expiryTime <= 0) {
      countdownEl.textContent = 'Code has expired. Please request a new one.';
      countdownEl.classList.add('expired');
      clearInterval(countdownInterval);
    }
    expiryTime--;
  }

  const countdownInterval = setInterval(updateCountdown, 1000);
  updateCountdown();

  // Resend button countdown (30 seconds)
  const justResent = /*[[${justResent}]]*/ false;
  let resendTime = justResent ? 0 : 30;
  const resendBtn = document.getElementById('resendBtn');
  const resendTimer = document.getElementById('resendTimer');

  function updateResendTimer() {
    if (resendTime > 0) {
      const minutes = Math.floor(resendTime / 60);
      const seconds = resendTime % 60;
      resendTimer.textContent = minutes > 0 ? `${minutes}:${seconds.toString().padStart(2, '0')}` : `0:${seconds.toString().padStart(2, '0')}`;
      resendTime--;
    } else {
      resendBtn.disabled = false;
      resendBtn.innerHTML = 'Resend code';
      resendBtn.removeAttribute('data-tooltip');
      clearInterval(resendInterval);
    }
  }

  const resendInterval = setInterval(updateResendTimer, 1000);
  updateResendTimer();
</script>
</body>
</html>
