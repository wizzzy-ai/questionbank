<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>
  <link rel="stylesheet" th:href="@{/css/auth.css}" href="/css/auth.css">
</head>
<body class="auth-page">
<main class="auth-shell" style="grid-template-columns:1fr;max-width:760px;">
  <section class="auth-panel" style="padding:0;">
    <div class="auth-panel__inner">
      <div class="auth-form is-active" style="position:static;opacity:1;visibility:visible;transform:none;pointer-events:auto;">
        <header class="auth-form__head">
          <p class="auth-form__eyebrow">Create New Password</p>
          <h2>Choose a fresh password.</h2>
        </header>
        <form class="auth-form__body" th:action="@{/reset-password}" th:object="${passwordResetForm}" method="post">
          <input type="hidden" th:field="*{token}">
          <div class="field-group">
            <label for="password">Password</label>
            <div class="field-shell">
              <span class="field-shell__icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
              </span>
              <input id="password" type="password" th:field="*{password}">
              <button class="field-shell__toggle" type="button" data-password-toggle="password" aria-label="Show or hide password">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <p class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
          </div>
          <div class="field-group">
            <label for="confirmPassword">Confirm Password</label>
            <div class="field-shell">
              <span class="field-shell__icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
              </span>
              <input id="confirmPassword" type="password" th:field="*{confirmPassword}">
              <button class="field-shell__toggle" type="button" data-password-toggle="confirmPassword" aria-label="Show or hide password">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <p class="field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></p>
          </div>
          <button class="primary-button" type="submit">Update password</button>
        </form>
      </div>
    </div>
  </section>
</main>
<script th:src="@{/js/auth.js}" src="/js/auth.js"></script>
</body>
</html>
