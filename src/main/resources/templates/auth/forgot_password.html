<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password</title>
  <link rel="stylesheet" th:href="@{/css/auth.css}" href="/css/auth.css">
</head>
<body class="auth-page">
<main class="auth-shell" style="grid-template-columns:1fr;max-width:760px;">
  <section class="auth-panel" style="padding:0;">
    <div class="auth-panel__inner">
      <div class="auth-form is-active" style="position:static;opacity:1;visibility:visible;transform:none;pointer-events:auto;">
        <header class="auth-form__head">
          <p class="auth-form__eyebrow">Password Reset</p>
          <h2>Request a reset link.</h2>
          <p>Enter your email and we will prepare a password reset link for this account.</p>
        </header>
        <div class="auth-alert auth-alert--info" th:if="${info}" th:text="${info}"></div>
        <form class="auth-form__body" th:action="@{/forgot-password}" th:object="${passwordResetRequestForm}" method="post">
          <div class="field-group">
            <label for="email">Email</label>
            <div class="field-shell">
              <input id="email" type="email" th:field="*{email}" placeholder="you@example.com">
            </div>
            <p class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
          </div>
          <button class="primary-button" type="submit">Generate reset link</button>
        </form>
      </div>
    </div>
  </section>
</main>
</body>
</html>
