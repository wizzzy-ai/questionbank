<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Link</title>
  <link rel="stylesheet" th:href="@{/css/auth.css}" href="/css/auth.css">
</head>
<body class="auth-page">
<main class="auth-shell" style="grid-template-columns:1fr;max-width:760px;">
  <section class="auth-panel" style="padding:0;">
    <div class="auth-panel__inner">
      <div class="auth-form is-active" style="position:static;opacity:1;visibility:visible;transform:none;pointer-events:auto;">
        <header class="auth-form__head">
          <p class="auth-form__eyebrow">Reset Ready</p>
          <h2>Password reset link generated.</h2>
          <p th:text="'Use this development link to reset the password for ' + ${email} + '.'">Use the link below.</p>
        </header>
        <div class="auth-alert auth-alert--info">SMTP is not configured yet, so the reset link is displayed here.</div>
        <div class="field-group" th:if="${resetToken}">
          <label>Reset link</label>
          <div class="field-shell">
            <input type="text" readonly th:value="${'http://localhost:8080/reset-password?token=' + resetToken}">
          </div>
        </div>
        <a class="text-link" th:href="@{/login}">Back to login</a>
      </div>
    </div>
  </section>
</main>
</body>
</html>
