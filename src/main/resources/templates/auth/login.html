<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Login • Question Bank</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link th:href="@{/css/app.css}" rel="stylesheet"/>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand" th:href="@{/}">
      <span class="brand-logo-block">QB</span>
      Question Bank
    </a>
    <div class="ms-auto">
      <a class="btn btn-gold-outline btn-sm" th:href="@{/register}">
        <i class="bi bi-person-plus me-1"></i>Create Account
      </a>
    </div>
  </div>
</nav>

<main class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-7 col-lg-5">

      <!-- Logo block -->
      <div class="text-center mb-4">
        <div class="d-inline-flex align-items-center justify-content-center mb-3"
             style="width:72px;height:72px;background:linear-gradient(135deg,var(--gold-dark),var(--gold));border-radius:20px;box-shadow:var(--shadow-gold);">
          <span style="font-size:1.7rem;font-weight:800;color:#000;letter-spacing:-1px;">QB</span>
        </div>
        <h1 class="h5 fw-bold mb-1">Question Bank System</h1>
        <p class="text-muted-2 small mb-0">Your gateway to academic excellence</p>
      </div>

      <!-- Card -->
      <div class="card card-glass">
        <div class="card-body p-4 p-md-5">
          <h2 class="h5 fw-bold mb-1">Welcome Back</h2>
          <p class="text-muted-2 small mb-4">Sign in to continue your journey</p>

          <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

          <form th:action="@{/login}" th:object="${loginForm}" method="post" class="vstack gap-3">
            <div class="alert alert-danger" th:if="${#fields.hasErrors('*')}">
              Please fix the errors and try again.
            </div>

            <div>
              <label class="form-label">Email Address</label>
              <div class="input-group">
                <span class="input-group-text" style="background:var(--bg-input);border:1px solid var(--border-subtle);border-right:none;border-radius:var(--radius-sm) 0 0 var(--radius-sm);color:var(--text-muted);">
                  <i class="bi bi-envelope"></i>
                </span>
                <input class="form-control" type="email" placeholder="name@example.com"
                       th:field="*{email}"
                       style="border-left:none;border-radius:0 var(--radius-sm) var(--radius-sm) 0;"/>
              </div>
              <div class="text-danger small mt-1" th:errors="*{email}"></div>
            </div>

            <div>
              <label class="form-label">Password</label>
              <div class="input-group">
                <span class="input-group-text" style="background:var(--bg-input);border:1px solid var(--border-subtle);border-right:none;border-radius:var(--radius-sm) 0 0 var(--radius-sm);color:var(--text-muted);">
                  <i class="bi bi-lock"></i>
                </span>
                <input class="form-control" type="password" placeholder="••••••••"
                       th:field="*{password}"
                       style="border-left:none;border-radius:0 var(--radius-sm) var(--radius-sm) 0;"/>
              </div>
              <div class="text-danger small mt-1" th:errors="*{password}"></div>
            </div>

            <button class="btn btn-gold btn-lg w-100 mt-1" type="submit">
              <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
            </button>
          </form>

          <hr class="divider"/>

          <p class="text-center text-muted-2 small mb-0">
            Don't have an account?
            <a class="text-gold fw-semibold" th:href="@{/register}">Register here</a>
          </p>
        </div>
      </div>

    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
