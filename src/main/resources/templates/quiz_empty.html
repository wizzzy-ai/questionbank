<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>No Questions • Question Bank</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link th:href="@{/css/app.css}" rel="stylesheet"/>
</head>
<body class="has-bottom-nav">

<!-- Sidebar -->
<div th:insert="~{fragments/sidebar :: sidebar('quiz')}"></div>
<!-- Mobile bottom nav -->
<div th:insert="~{fragments/bottom_nav :: bottomNav('quiz')}"></div>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <button class="navbar-menu-btn me-3" type="button"
            data-bs-toggle="offcanvas" data-bs-target="#appSidebar"
            aria-controls="appSidebar" aria-label="Open menu">
      <i class="bi bi-list"></i>
    </button>
    <a class="navbar-brand" th:href="@{/dashboard}">
      <span class="brand-logo-block">QB</span>
      Question Bank
    </a>
  </div>
</nav>

<main class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-9 col-lg-6">
      <div class="card card-glass">
        <div class="card-body p-4 p-md-5 text-center">
          <div class="d-inline-flex align-items-center justify-content-center mb-4"
               style="width:80px;height:80px;background:var(--gold-dim);border:1px solid var(--border-gold);border-radius:20px;">
            <i class="bi bi-journal-x" style="font-size:2rem;color:var(--gold);"></i>
          </div>
          <h1 class="h4 fw-bold mb-2">No Questions Yet</h1>
          <p class="text-muted-2 mb-4" th:text="${message}">No questions found in the question bank.</p>
          <a class="btn btn-gold btn-lg" th:href="@{/dashboard}">
            <i class="bi bi-arrow-left me-2"></i>Back to Dashboard
          </a>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
