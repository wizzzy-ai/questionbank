<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Quiz History</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link th:href="@{/css/app.css}" rel="stylesheet"/>
</head>
<body>
<div class="page-load-bar"></div>
<div th:insert="~{fragments/app_nav :: appNav('results')}"></div>
<main class="container py-4 py-md-5 content-fade">
  <section class="vstack gap-4">
    <div class="card card-glass">
      <div class="card-body p-4 p-lg-5">
        <span class="section-label"><i class="bi bi-clock-history"></i>History</span>
        <h1 class="h3 fw-bold mt-2 mb-1">Your quiz attempts</h1>
        <p class="text-muted-2 mb-0">Review previous runs, check quiz modes, and open a full breakdown for each result.</p>
      </div>
    </div>
    <div class="card card-glass">
      <div class="card-body p-4 p-lg-5">
        <div th:if="${#lists.isEmpty(results)}" class="text-center text-muted-2 py-5">No quiz history yet.</div>
        <div th:if="${!#lists.isEmpty(results)}" class="table-responsive">
          <table class="table table-dark-custom align-middle mb-0">
            <thead>
            <tr>
              <th>Date</th>
              <th>Mode</th>
              <th>Topics</th>
              <th class="text-center">Score</th>
              <th class="text-end">Details</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="result : ${results}">
              <td th:text="${result.submittedAt != null ? #temporals.format(result.submittedAt.atZone(T(java.time.ZoneId).systemDefault()), 'dd MMM yyyy, HH:mm') : 'N/A'}">24 Apr 2026</td>
              <td><span class="pill" th:text="${result.mode}">CUSTOM</span></td>
              <td class="text-muted-2" th:text="${result.topicSummary}">Mixed topics</td>
              <td class="text-center fw-bold" th:text="${#numbers.formatDecimal(result.percentage, 0, 1)} + '%'">80.0%</td>
              <td class="text-end"><a class="btn btn-gold-outline btn-sm" th:href="@{/results/{id}(id=${result.id})}">Open</a></td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </section>
</main>
</body>
</html>
