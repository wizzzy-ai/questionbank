<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${pageTitle} + ' - QuizQuest'">Legal Page - QuizQuest</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --peach-bg: #FDF6F0;
      --cream: #FFF8F5;
      --orange-50: #FFF7ED;
      --orange-100: #FFEDD5;
      --orange-200: #FED7AA;
      --orange-400: #FB923C;
      --orange-500: #F97316;
      --orange-600: #EA580C;
      --slate-50: #F8FAFC;
      --slate-100: #F1F5F9;
      --slate-400: #94A3B8;
      --slate-600: #475569;
      --slate-800: #1E293B;
      --slate-900: #0F172A;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, var(--peach-bg) 0%, var(--cream) 100%);
      color: var(--slate-800);
      line-height: 1.7;
      min-height: 100vh;
    }

    /* Reduced motion support */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* Header */
    .header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(255, 248, 245, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(249, 115, 22, 0.1);
      padding: 1rem 0;
    }

    .header-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
      color: var(--slate-900);
      font-weight: 700;
      font-size: 1.25rem;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--orange-500) 0%, var(--orange-600) 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 1.1rem;
      box-shadow: 0 4px 12px rgba(249, 115, 22, 0.25);
    }

    .home-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.625rem 1.25rem;
      background: var(--orange-500);
      color: white;
      text-decoration: none;
      border-radius: 9999px;
      font-weight: 500;
      font-size: 0.875rem;
      transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
      box-shadow: 0 4px 14px rgba(249, 115, 22, 0.35);
    }

    .home-btn:hover {
      background: var(--orange-600);
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(249, 115, 22, 0.4);
    }

    .home-btn svg {
      width: 16px;
      height: 16px;
    }

    /* Main Container */
    .main-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
      animation: fadeInUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Hero Card */
    .hero-card {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.9) 0%, rgba(255, 247, 237, 0.9) 100%);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 2.5rem;
      margin-bottom: 2rem;
      box-shadow: 
        0 4px 6px -1px rgba(0, 0, 0, 0.05),
        0 10px 20px -5px rgba(249, 115, 22, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(249, 115, 22, 0.1);
      text-align: center;
    }

    .hero-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--orange-100) 0%, var(--orange-200) 100%);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      color: var(--orange-600);
    }

    .hero-icon svg {
      width: 32px;
      height: 32px;
    }

    .hero-title {
      font-size: clamp(1.75rem, 5vw, 2.5rem);
      font-weight: 700;
      color: var(--slate-900);
      margin-bottom: 0.75rem;
      line-height: 1.2;
    }

    .hero-date {
      color: var(--slate-400);
      font-size: 0.875rem;
      font-weight: 500;
    }

    /* Summary Box */
    .summary-box {
      background: linear-gradient(135deg, var(--orange-50) 0%, rgba(255, 237, 213, 0.5) 100%);
      border: 1px solid var(--orange-100);
      border-radius: 20px;
      padding: 1.5rem 2rem;
      margin-bottom: 2rem;
      display: flex;
      gap: 1rem;
      align-items: flex-start;
      transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      opacity: 0;
      animation: fadeInUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
    }

    .summary-box:hover {
      transform: scale(1.02);
      box-shadow: 0 8px 24px rgba(249, 115, 22, 0.15);
    }

    .summary-icon {
      width: 40px;
      height: 40px;
      background: var(--orange-500);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      flex-shrink: 0;
    }

    .summary-icon svg {
      width: 20px;
      height: 20px;
    }

    .summary-content {
      flex: 1;
    }

    .summary-content strong {
      color: var(--orange-600);
      font-weight: 600;
    }

    .summary-content p {
      color: var(--slate-600);
      font-size: 0.9375rem;
    }

    /* Section Cards */
    .section-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 2rem;
      margin-bottom: 1.5rem;
      box-shadow: 
        0 2px 4px -1px rgba(0, 0, 0, 0.03),
        0 8px 16px -4px rgba(0, 0, 0, 0.05);
      border: 1px solid rgba(249, 115, 22, 0.08);
      transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      opacity: 0;
      animation: fadeInUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .section-card:hover {
      transform: translateY(-5px);
      box-shadow: 
        0 12px 24px -6px rgba(0, 0, 0, 0.08),
        0 4px 8px -2px rgba(0, 0, 0, 0.03);
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .section-number {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--orange-500) 0%, var(--orange-600) 100%);
      color: white;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.875rem;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(249, 115, 22, 0.3);
    }

    .section-title {
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--orange-600);
      line-height: 1.4;
    }

    .section-content {
      color: var(--slate-600);
      font-size: 0.9375rem;
    }

    .section-content p {
      margin-bottom: 1rem;
    }

    .section-content p:last-child {
      margin-bottom: 0;
    }

    .section-content ul {
      padding-left: 1.25rem;
      margin-bottom: 1rem;
    }

    .section-content li {
      margin-bottom: 0.5rem;
    }

    .section-content li:last-child {
      margin-bottom: 0;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 2rem;
      color: var(--slate-400);
      font-size: 0.875rem;
      border-top: 1px solid rgba(249, 115, 22, 0.1);
      margin-top: 2rem;
      opacity: 0;
      animation: fadeInUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.8s forwards;
    }

    .footer a {
      color: var(--orange-500);
      text-decoration: none;
      font-weight: 500;
    }

    .footer a:hover {
      color: var(--orange-600);
    }

    /* Staggered animations */
    .section-card:nth-child(1) { animation-delay: 0.1s; }
    .section-card:nth-child(2) { animation-delay: 0.2s; }
    .section-card:nth-child(3) { animation-delay: 0.3s; }
    .section-card:nth-child(4) { animation-delay: 0.4s; }
    .section-card:nth-child(5) { animation-delay: 0.5s; }
    .section-card:nth-child(6) { animation-delay: 0.6s; }
    .section-card:nth-child(7) { animation-delay: 0.7s; }
    .section-card:nth-child(8) { animation-delay: 0.8s; }
    .section-card:nth-child(9) { animation-delay: 0.9s; }
    .section-card:nth-child(10) { animation-delay: 1s; }

    /* Responsive */
    @media (max-width: 640px) {
      .main-container {
        padding: 2rem 1rem;
      }

      .hero-card {
        padding: 1.75rem;
        border-radius: 20px;
      }

      .hero-icon {
        width: 56px;
        height: 56px;
      }

      .hero-icon svg {
        width: 28px;
        height: 28px;
      }

      .summary-box {
        padding: 1.25rem;
        flex-direction: column;
        gap: 0.75rem;
      }

      .section-card {
        padding: 1.5rem;
        border-radius: 16px;
      }

      .section-header {
        gap: 0.75rem;
      }

      .section-number {
        width: 32px;
        height: 32px;
        border-radius: 10px;
        font-size: 0.8rem;
      }

      .section-title {
        font-size: 1rem;
      }

      .header-container {
        padding: 0 1rem;
      }

      .home-btn span {
        display: none;
      }

      .home-btn {
        padding: 0.625rem;
      }
    }
  </style>
</head>
<body>
  <!-- Public Header -->
  <header class="header">
    <div class="header-container">
      <a href="/" class="logo">
        <div class="logo-icon">Q</div>
        <span>QuizQuest</span>
      </a>
      <a href="/" class="home-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        <span>Home</span>
      </a>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main-container">
    <!-- Hero Card -->
    <div class="hero-card">
      <div class="hero-icon">
        <svg th:if="${pageType == 'terms'}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
        </svg>
        <svg th:if="${pageType == 'privacy'}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
      </div>
      <h1 class="hero-title" th:text="${pageTitle}">Legal Title</h1>
      <p class="hero-date">Last Updated: May 3, 2026</p>
    </div>

    <!-- Summary Box -->
    <div th:if="${summary}" class="summary-box">
      <div class="summary-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="16" x2="12" y2="12"></line>
          <line x1="12" y1="8" x2="12.01" y2="8"></line>
        </svg>
      </div>
      <div class="summary-content" th:utext="${summary}"></div>
    </div>

    <!-- Section Cards -->
    <div th:each="section, iterStat : ${sections}" class="section-card">
      <div class="section-header">
        <div class="section-number" th:text="${iterStat.count}">1</div>
        <h2 class="section-title" th:text="${section.title}">Section Title</h2>
      </div>
      <div class="section-content" th:utext="${section.content}"></div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>Questions? Contact us at <a href="mailto:support@quizquest.local">support@quizquest.local</a></p>
    <p style="margin-top: 0.5rem;">&copy; 2026 QuizQuest. All rights reserved.</p>
  </footer>
</body>
</html>
