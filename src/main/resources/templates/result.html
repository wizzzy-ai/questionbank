<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Quiz Result</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link th:href="@{/css/app.css}" rel="stylesheet"/>
</head>
<body>
<div class="page-load-bar"></div>
<div th:insert="~{fragments/app_nav :: appNav('results')}"></div>
<main class="container py-4 py-md-5 content-fade">
  <section th:fragment="resultBody" class="vstack gap-4">
    <div class="card card-glass">
      <div class="card-body p-4 p-lg-5">
        <div class="d-flex align-items-start justify-content-between flex-wrap gap-3">
          <div>
            <span class="section-label"><i class="bi bi-patch-check"></i>Quiz Complete</span>
            <h1 class="h3 fw-bold mt-2 mb-1">Your result is ready.</h1>
            <p class="text-muted-2 mb-0" th:text="${result.mode + ' mode | ' + result.topicSummary}">CUSTOM mode | Mixed topics</p>
          </div>
          <a class="btn btn-gold-outline" th:href="@{/results}">
            <i class="bi bi-clock-history me-2"></i>View history
          </a>
        </div>
      </div>
    </div>

    <div class="row g-4">
      <div class="col-12 col-lg-4">
        <div class="card card-glass h-100">
          <div class="card-body p-4">
            <div class="text-muted-2 small">Score</div>
            <div class="metric-accent fw-bold mt-2" style="font-size:3rem;" th:text="${#numbers.formatDecimal(result.percentage, 0, 1) + '%'}">0%</div>
            <div class="text-subtle mt-2" th:text="${result.score + ' correct out of ' + result.totalQuestions}">0 correct out of 0</div>
            <div class="card-inner p-3 mt-4">
              <div class="text-muted-2 small">Points earned</div>
              <div class="fw-bold mt-2" style="font-size:1.5rem;" th:text="${'+' + pointsAwarded}">+0</div>
            </div>
            <div class="card-inner p-3 mt-3">
              <div class="text-muted-2 small">Duration</div>
              <div class="fw-bold mt-2" th:text="${result.durationSeconds + ' seconds'}">0 seconds</div>
            </div>
          </div>
        </div>
      </div>

      <div class="col-12 col-lg-8">
        <div class="card card-glass h-100">
          <div class="card-body p-4 p-lg-5">
            <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-4">
              <div>
                <span class="section-label"><i class="bi bi-list-check"></i>Breakdown</span>
                <h2 class="h4 fw-bold mt-2 mb-0">Question-by-question review</h2>
              </div>
              <span class="pill" th:text="${#lists.size(breakdown) + ' questions'}">10 questions</span>
            </div>

            <div class="vstack gap-3">
              <div th:each="item, stat : ${breakdown}" class="card-inner p-3">
                <div class="d-flex align-items-start justify-content-between gap-3 flex-wrap">
                  <div class="flex-grow-1">
                    <div class="d-flex align-items-center gap-2 flex-wrap mb-2">
                      <span class="pill" th:text="${'Q' + stat.count}">Q1</span>
                      <span class="badge text-bg-secondary" th:text="${item.question.category}">Java</span>
                      <span class="badge"
                            th:classappend="${item.correct ? ' text-bg-success' : ' text-bg-danger'}"
                            th:text="${item.correct ? 'Correct' : (item.userAnswer == null ? 'Skipped' : 'Wrong')}">Correct</span>
                    </div>
                    <div class="fw-semibold mb-3" th:text="${item.question.questionText}">Question text</div>
                    <div class="text-muted-2 small">
                      Your answer:
                      <span class="fw-semibold" th:text="${item.userAnswer != null ? item.userAnswer : 'Not answered'}">A</span>
                    </div>
                    <div class="text-muted-2 small">
                      Correct answer:
                      <span class="fw-semibold" th:text="${item.correctAnswer}">B</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="d-flex gap-2 flex-wrap mt-4">
              <a class="btn btn-gold start-quiz-btn" th:href="@{/quiz/setup}">
                <i class="bi bi-arrow-repeat me-2"></i>Start another quiz
              </a>
              <a class="btn btn-gold-outline" th:href="@{/dashboard}">
                <i class="bi bi-grid me-2"></i>Dashboard
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>
</body>
</html>
