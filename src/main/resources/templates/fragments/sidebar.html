<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!--
  Sidebar offcanvas fragment.
  Usage: <div th:insert="~{fragments/sidebar :: sidebar('dashboard')}"></div>
  activePage values: 'dashboard' | 'quiz' | 'results' | 'bookmarks' | 'profile'
-->
<aside th:fragment="sidebar(activePage)"
       class="offcanvas offcanvas-start sidebar-offcanvas"
       tabindex="-1"
       id="appSidebar"
       aria-labelledby="appSidebarLabel">

  <!-- Header -->
  <div class="offcanvas-header" style="border-bottom:1px solid rgba(255,255,255,0.55);padding:1.25rem 1.5rem;">
    <div class="d-flex align-items-center gap-2">
      <div class="brand-logo-block">QB</div>
      <div>
        <div class="fw-bold" style="font-size:0.95rem;line-height:1.2;">Question Bank</div>
        <div class="text-muted-2" style="font-size:0.7rem;">Learning Platform</div>
      </div>
    </div>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
  </div>

  <!-- Body -->
  <div class="offcanvas-body d-flex flex-column p-0">

    <!-- Nav section label -->
    <div style="padding:1rem 1.5rem 0.5rem;">
      <span class="section-label mb-0">Main Menu</span>
    </div>

    <!-- Nav links -->
    <nav style="padding:0 0.75rem 1rem;">

      <a th:href="@{/dashboard}"
         th:class="${'sidebar-link' + (activePage == 'dashboard' ? ' active' : '')}">
        <i class="bi bi-grid-fill sidebar-icon"></i>
        <span>Dashboard</span>
        <i class="bi bi-chevron-right ms-auto opacity-25" style="font-size:0.7rem;"></i>
      </a>

      <a th:href="@{/quiz/start(count=10)}"
         th:class="${'sidebar-link' + (activePage == 'quiz' ? ' active' : '')}">
        <i class="bi bi-play-circle-fill sidebar-icon"></i>
        <span>Start Test</span>
        <i class="bi bi-chevron-right ms-auto opacity-25" style="font-size:0.7rem;"></i>
      </a>

      <a th:href="@{/dashboard}"
         th:class="${'sidebar-link' + (activePage == 'results' ? ' active' : '')}">
        <i class="bi bi-bar-chart-fill sidebar-icon"></i>
        <span>Results</span>
        <i class="bi bi-chevron-right ms-auto opacity-25" style="font-size:0.7rem;"></i>
      </a>

      <a th:href="@{/bookmarks}"
         th:class="${'sidebar-link' + (activePage == 'bookmarks' ? ' active' : '')}">
        <i class="bi bi-star-fill sidebar-icon"></i>
        <span>Bookmarked</span>
        <i class="bi bi-chevron-right ms-auto opacity-25" style="font-size:0.7rem;"></i>
      </a>

      <a th:href="@{/profile}"
         th:class="${'sidebar-link' + (activePage == 'profile' ? ' active' : '')}">
        <i class="bi bi-person-circle sidebar-icon"></i>
        <span>Profile</span>
        <i class="bi bi-chevron-right ms-auto opacity-25" style="font-size:0.7rem;"></i>
      </a>

    </nav>

    <!-- Divider -->
    <div style="height:1px;background:var(--border-subtle);margin:0 1.5rem;"></div>

    <!-- Quick actions -->
    <div style="padding:1rem 1.5rem 0.5rem;">
      <span class="section-label mb-0">Quick Start</span>
    </div>
    <div style="padding:0 0.75rem 1rem;display:flex;flex-direction:column;gap:6px;">
      <a th:href="@{/quiz/start(count=10)}"
         class="btn btn-gold btn-sm w-100">
        <i class="bi bi-play-fill me-1"></i>10 Questions
      </a>
      <a th:href="@{/quiz/start(count=15)}"
         class="btn btn-gold-outline btn-sm w-100">
        <i class="bi bi-play me-1"></i>15 Questions
      </a>
    </div>

    <!-- Spacer -->
    <div class="flex-grow-1"></div>

    <!-- Footer: student info + logout -->
    <div style="border-top:1px solid var(--border-subtle);padding:1.25rem 1.5rem;">

      <!-- Student info chip (if logged in) -->
      <div th:if="${student != null}"
           class="d-flex align-items-center gap-2 mb-3">
        <div style="width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,0.72);border:1px solid rgba(255,255,255,0.55);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <i class="bi bi-person-fill" style="color:var(--coral-500);font-size:1rem;"></i>
        </div>
        <div style="overflow:hidden;">
          <div class="fw-semibold text-truncate"
               style="font-size:0.85rem;max-width:150px;"
               th:text="${student.fullName}">Student</div>
          <div class="text-muted-2" style="font-size:0.7rem;">Active session</div>
        </div>
      </div>

      <!-- Logout -->
      <form th:if="${student != null}" th:action="@{/logout}" method="post">
        <button class="btn btn-outline-light btn-sm w-100" type="submit">
          <i class="bi bi-box-arrow-right me-2"></i>Logout
        </button>
      </form>

      <!-- App version -->
      <div class="text-center mt-3" style="font-size:0.68rem;color:var(--text-subtle);">
        Question Bank System &copy; 2025
      </div>
    </div>

  </div>
</aside>

</body>
</html>
