<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Bookmarked Questions • Question Bank</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link th:href="@{/css/app.css}" rel="stylesheet"/>
</head>
<body class="has-bottom-nav">

<!-- Page-load bar -->
<div class="page-load-bar"></div>

<!-- Sidebar -->
<div th:insert="~{fragments/sidebar :: sidebar('bookmarks')}"></div>
<!-- Mobile bottom nav -->
<div th:insert="~{fragments/bottom_nav :: bottomNav('bookmarks')}"></div>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <button class="navbar-menu-btn me-3" type="button"
            data-bs-toggle="offcanvas" data-bs-target="#appSidebar"
            aria-controls="appSidebar" aria-label="Open menu">
      <i class="bi bi-list"></i>
    </button>

    <a class="navbar-brand" th:href="@{/dashboard}">
      <span class="brand-logo-block">QB</span>
      Question Bank
    </a>

    <div class="ms-auto d-flex align-items-center gap-2">
      <span class="pill-nav d-none d-sm-inline-flex">
        <i class="bi bi-star-fill" style="color:var(--gold);font-size:0.9rem;"></i>
        <span>Bookmarks</span>
      </span>
      <form th:action="@{/logout}" method="post" class="m-0">
        <button class="btn btn-outline-light btn-sm" type="submit">
          <i class="bi bi-box-arrow-right me-1"></i><span class="d-none d-sm-inline">Logout</span>
        </button>
      </form>
    </div>
  </div>
</nav>

<main class="container py-4 py-md-5">
  <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-4">
    <div>
      <h1 class="h5 fw-bold mb-1">
        <i class="bi bi-star-fill text-gold me-2"></i>Bookmarked Questions
      </h1>
      <p class="text-muted-2 small mb-0">Quickly revisit questions you starred during a test.</p>
    </div>
    <span class="pill" th:text="${#lists.size(bookmarks)} + ' saved'">0 saved</span>
  </div>

  <div th:if="${#lists.isEmpty(bookmarks)}" class="text-center py-5">
    <div style="font-size:2.5rem;margin-bottom:1rem;">⭐</div>
    <p class="text-muted-2 mb-1 fw-semibold">No bookmarks yet</p>
    <p class="text-subtle small mb-4">Start a test and tap the star on any question to save it here.</p>
    <a class="btn btn-gold btn-lg" th:href="@{/quiz/start(count=10)}">
      <i class="bi bi-play-fill me-2"></i>Start a Test
    </a>
  </div>

  <div th:if="${!#lists.isEmpty(bookmarks)}" class="vstack gap-3">
    <div class="card card-glass" th:each="b : ${bookmarks}">
      <div class="card-body p-4">
        <div class="d-flex align-items-start justify-content-between gap-3 mb-2">
          <div class="flex-grow-1">
            <div class="d-flex align-items-center gap-2 mb-2">
              <span class="badge text-bg-secondary" th:text="${b.question.category}">Java</span>
              <span class="text-subtle" style="font-size:0.75rem;"
                    th:text="${#temporals.format(b.createdAt, 'dd MMM yyyy, HH:mm')}">Saved</span>
            </div>
            <p class="mb-0 fw-semibold" style="font-size:1rem;line-height:1.55;"
               th:text="${b.question.questionText}">Question text</p>
          </div>

          <form th:action="@{/bookmarks/remove}" method="post" class="m-0">
            <input type="hidden" name="questionId" th:value="${b.question.id}"/>
            <button type="submit" class="btn btn-gold-outline btn-sm" title="Remove bookmark">
              <i class="bi bi-star-fill me-1"></i><span class="d-none d-sm-inline">Remove</span>
            </button>
          </form>
        </div>

        <div class="card-inner p-3 mt-3">
          <div class="vstack gap-2" style="font-size:0.92rem;">
            <div class="d-flex gap-2"><span class="option-letter">A</span><span th:text="${b.question.optionA}">Option A</span></div>
            <div class="d-flex gap-2"><span class="option-letter">B</span><span th:text="${b.question.optionB}">Option B</span></div>
            <div class="d-flex gap-2"><span class="option-letter">C</span><span th:text="${b.question.optionC}">Option C</span></div>
            <div class="d-flex gap-2"><span class="option-letter">D</span><span th:text="${b.question.optionD}">Option D</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
