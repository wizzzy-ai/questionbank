spring.application.name=quizquest
# Use environment variable for flexibility
server.port=${SERVER_PORT:8080}
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/question_bank?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Africa/Lagos}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

spring.thymeleaf.cache=false
server.error.whitelabel.enabled=false
server.error.include-message=always
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false
server.error.path=/error

# Session Configuration
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.name=QUIZQUEST_SESSION

# Server Compression
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,text/css,application/javascript

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when-authorized
management.info.env.enabled=true
info.app.name=QuizQuest
info.app.description=Java Programming Quest Platform
info.app.version=1.0.0

app.bootstrap-admin.enabled=true
app.bootstrap-admin.full-name=${DEFAULT_ADMIN_FULL_NAME:Default Admin}
app.bootstrap-admin.email=${DEFAULT_ADMIN_EMAIL:admin@quizquest.local}
app.bootstrap-admin.password=${DEFAULT_ADMIN_PASSWORD:Admin@12345}

# Email Configuration (SMTP)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:samjosh013@gmail.com}
spring.mail.password=${MAIL_PASSWORD:ewqe xebl vkyg rgxm}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
spring.mail.properties.mail.debug=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
app.email.from=${MAIL_FROM:samjosh013@gmail.com}
app.email.enabled=${EMAIL_ENABLED:true}

# Logging Configuration for Mail Debugging
logging.level.org.springframework.mail=DEBUG
logging.level.jakarta.mail=DEBUG
logging.level.com.sun.mail=DEBUG
